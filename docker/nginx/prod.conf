# Production: di belakang Cloudflare (Full strict).
# Cloudflare -> origin lewat HTTPS:443 memakai Cloudflare Origin Certificate.

# Port 80: redirect ke HTTPS (jaga-jaga bila ada akses langsung).
server {
    listen 80;
    server_name acceptra.id www.acceptra.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name acceptra.id www.acceptra.id;

    ssl_certificate     /etc/nginx/certs/acceptra.id.pem;
    ssl_certificate_key /etc/nginx/certs/acceptra.id.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/html/public;
    index index.php;

    charset utf-8;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
